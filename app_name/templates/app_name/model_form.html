{% extends '[APP_NAME]/base.html' %}
{% block title %}{% if item %}Редактирование{% else %}Создание{% endif %}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0">{% if item %}Редактирование записи #{{ item.id }}{% else %}Новая запись{% endif %}</h4>
            </div>
            <div class="card-body">
                <form method="post" novalidate>
                    {% csrf_token %}
                    {{ form.as_p }}
                    <div class="mt-4 d-flex justify-content-between">
                        <a href="{% url '[MODEL_LOWER]_list' %}" class="btn btn-secondary">Отмена</a>
                        <button type="submit" class="btn btn-success">Сохранить изменения</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
