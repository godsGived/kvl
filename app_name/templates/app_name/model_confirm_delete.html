{% extends 'products/base.html' %}
{% block title %}Удаление товара{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger shadow-sm">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">Опасная операция!</h4>
            </div>
            <div class="card-body text-center py-4">
                <h5>Вы уверены, что хотите безвозвратно удалить товар?</h5>
                <p class="text-muted mt-2">"{{ product.name }}" (Артикул: {{ product.sku }})</p>
                <form method="post" class="mt-4">
                    {% csrf_token %}
                    <a href="{% url 'product_list' %}" class="btn btn-secondary me-2">Нет, отмена</a>
                    <button type="submit" class="btn btn-danger">Да, удалить</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
